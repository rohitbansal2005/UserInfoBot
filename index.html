<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Unlock UI Demo</title>
  <style>
    :root{--bg:#071019;--card:#0b1620;--btn:#0e3a3f;--btn2:#18324a;--muted:#9db}
    html,body{height:100%;margin:0;font-family:Inter,Segoe UI,system-ui,Arial}
    body{background:linear-gradient(180deg,#041018 0%, #071827 100%);display:flex;align-items:center;justify-content:center;color:#dbe}
    .card{width:680px;max-width:94%;background:var(--card);border-radius:10px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.6)}
    .bubble{background:#0b2a33;padding:12px;border-radius:8px;color:#dff;display:flex;align-items:center;gap:12px}
    .btn{width:100%;display:block;padding:12px 14px;border-radius:10px;border:none;background:var(--btn);color:#fff;font-size:15px;text-align:left;cursor:pointer}
    .btn.secondary{background:var(--btn2)}
    .btn .emoji{display:inline-block;width:28px;text-align:center;margin-right:10px}
    .stack{margin-top:10px;display:flex;flex-direction:column;gap:10px}
    .hidden{display:none}
    .meta{font-size:13px;color:var(--muted);margin-top:8px;display:flex;justify-content:space-between;align-items:center}
    a.reset{color:var(--muted);text-decoration:none;background:transparent;border:0;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <div class="bubble">
      <div style="flex:1">
        <div style="font-weight:600;margin-bottom:6px">Sample message preview</div>
        <div style="font-size:13px;opacity:.9">Image + unlock CTA</div>
      </div>
      <div style="width:56px;height:56px;border-radius:8px;background:linear-gradient(135deg,#2b6 0%,#38a 100%);"></div>
    </div>

    <div class="stack">
      <!-- Initially only the unlock button is present; the second button is created dynamically after unlock -->
      <button id="unlockBtn" class="btn" type="button"><span class="emoji">🔒</span> Unlock on Zoktu</button>
    </div>

    <div class="meta">
      <div>No server — client-only demo</div>
      <div><button id="resetBtn" class="reset">Reset</button></div>
    </div>
  </main>

  <script>
    // === CONFIG ===
    // Change this to the external URL you want to open on click.
    const TARGET_URL = 'https://example.com';

    // Elements
    const unlockBtn = document.getElementById('unlockBtn');
    let unlockedBtn = null; // created dynamically
    const resetBtn = document.getElementById('resetBtn');
    const STORAGE_KEY = 'ui_unlocked_demo_v1';

    // Create the unlocked button dynamically so it never appears together with the unlock button
    function createUnlockedButton(){
      // avoid duplicates
      const existing = document.getElementById('unlockedBtn');
      if (existing) return existing;

      const btn = document.createElement('button');
      btn.id = 'unlockedBtn';
      btn.type = 'button';
      btn.className = 'btn secondary';
      btn.innerHTML = '<span class="emoji">✅</span> I\'ve unlocked — Show full profile';
      btn.addEventListener('click', () => {
        alert('Full profile would be shown here (demo).');
      });

      const stack = document.querySelector('.stack');
      stack.appendChild(btn);
      return btn;
    }

    function showUnlockedState(){
      unlockBtn.classList.add('hidden');
      unlockedBtn = createUnlockedButton();
      // ensure it's visible
      unlockedBtn.classList.remove('hidden');
    }

    function showLockedState(){
      unlockBtn.classList.remove('hidden');
      // remove dynamic button if present
      const existing = document.getElementById('unlockedBtn');
      if (existing) existing.remove();
      unlockedBtn = null;
    }

    // When user clicks the first button: open external site and reveal 2nd button.
    unlockBtn.addEventListener('click', () => {
      // open in new tab safely
      window.open(TARGET_URL, '_blank', 'noopener');
      // persist locally so UI stays unlocked on reload
      try{ localStorage.setItem(STORAGE_KEY, '1'); }catch(e){ console.warn('localStorage set failed', e); }
      showUnlockedState();
    });

    // Reset for testing
    resetBtn.addEventListener('click', () => {
      try{ localStorage.removeItem(STORAGE_KEY); }catch(e){ console.warn('localStorage remove failed', e); }
      showLockedState();
    });

    // Initialize UI from localStorage
    try{
      if (localStorage.getItem(STORAGE_KEY) === '1') showUnlockedState();
      else showLockedState();
    }catch(e){ console.warn('localStorage read failed', e); showLockedState(); }
  </script>
</body>
</html>
